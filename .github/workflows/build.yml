name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.mc }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mc: ['26.1.2', '26.2']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build -Pminecraft_version=${{ matrix.mc }}
      - uses: actions/upload-artifact@v4
        if: matrix.mc == '26.2'
        with:
          name: mathinchat
          path: build/libs/*.jar
